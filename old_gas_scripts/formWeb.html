<!DOCTYPE html>
<form oninput="total.value = (nights.valueAsNumber * 99) + 
((guests.valueAsNumber - 1) * 10)">

<p>
<label>Nome:</label>
<input type="text" id="full_name" name="full_name" required>

</p><p>
<label>Celular:</label>
<input type="text" id="celular" name="celular" required>
<label>Email:</label>
<input type="email" id="email_addr" name="email_addr" required>

</p><p>
<label>Apartamento:</label>
<input type="text" id="apartamento" name="apartamento" placeholder="Qualquer" required>
<label>Entrada:</label>
<input type="date" id="arrival_dt" name="arrival_dt" required>
<label>Diárias:</label>
<input type="number" id="nights" name="nights" value="1" min="1" max="30" required>

</p><p>
<label>Valor aceito:</label>
<input type="number" id="valor" name="valor" required>
<label>Qtd. pessoas:</label>
<input type="number" id="guests" name="guests" value="2" min="1" max="8" required>
<label>Qtd. quartos:</label>
<input type="number" id="quartos" name="quartos" value="2" min="2" max="3" required>

</p><p>
<label>Andar:</label>
<input type="number" id="andar" name="andar" value="1" min="1" max="3" required>
<label>Posição:</label>
<input type="text" id="posicao" name="posicao" placeholder=" " required>
<label>Proximidade:</label>
<input type="text" id="proximidade" name="proximidade" placeholder=" " required>
</p>

<input type="submit" value="Solicitar reserva" /> 
</form>

<script>
function check(input) {
if (input.value != document.getElementById('email_addr').value) {
input.setCustomValidity('The two email addresses must match.');
} else {
// input is valid -- reset the error message
input.setCustomValidity('');
}
} 
</script>
